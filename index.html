<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="식대계산기"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0a0b0f"/>
<title>식대 계산기</title>
<link rel="manifest" href="manifest.json"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b0f;--s1:#111318;--s2:#181b23;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.11);
  --acc:#3b82f6;--acc2:#6366f1;
  --grn:#22c55e;--org:#f97316;--red:#ef4444;--yel:#eab308;
  --t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;--t4:#1e293b;
}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Geist',system-ui,sans-serif;background:var(--bg);color:var(--t1);
  padding-top:env(safe-area-inset-top,0px);padding-bottom:env(safe-area-inset-bottom,0px)}

/* AUTH */
.aw{min-height:100svh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(ellipse 70% 50% at 50% -5%,rgba(59,130,246,.12) 0%,transparent 65%),var(--bg)}
.ac{width:100%;max-width:380px;background:var(--s1);border:1px solid var(--b2);border-radius:24px;padding:40px 32px}
.ae{font-size:48px;text-align:center;margin-bottom:10px}
.at{font-size:22px;font-weight:700;text-align:center;color:#fff}
.as{font-size:13px;color:var(--t3);text-align:center;margin:5px 0 28px}
.al{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:7px}
.ai{width:100%;padding:14px 16px;border-radius:12px;background:var(--s2);border:1px solid var(--b2);
  color:var(--t1);font-family:inherit;font-size:16px;outline:none;
  transition:border .2s,box-shadow .2s;margin-bottom:12px;-webkit-appearance:none;display:block}
.ai:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.ai::placeholder{color:var(--t4)}
.aac{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#1a1d27;
  border:1px solid var(--b2);border-radius:12px;z-index:99;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.aaci{padding:12px 16px;font-size:15px;cursor:pointer;color:var(--t2)}
.aaci:hover,.aaci:active{background:rgba(59,130,246,.2);color:var(--acc)}
.ab{width:100%;padding:15px;border-radius:12px;
  background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;
  color:#fff;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;
  margin-top:8px;display:block}
.ab:active{opacity:.85}
.ab:disabled{opacity:.4;cursor:not-allowed}
.abk{width:100%;padding:12px;background:none;border:none;color:var(--t3);
  font-family:inherit;font-size:13px;cursor:pointer;margin-top:6px;display:block}
.aerr{color:var(--red);font-size:13px;text-align:center;margin-top:8px;min-height:20px}
.aiwrap{position:relative}

/* HEADER */
.hdr{position:sticky;top:0;z-index:40;background:rgba(10,11,15,.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--b1);padding:0 16px;height:52px;
  display:flex;align-items:center;justify-content:space-between}
.hl{display:flex;align-items:center;gap:8px}
.htitle{font-size:15px;font-weight:700;color:#fff}
.hr{display:flex;align-items:center;gap:6px}
.upill{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);
  border-radius:99px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--acc)}
.hbtn{background:var(--s2);border:1px solid var(--b1);border-radius:8px;
  padding:6px 12px;font-size:11px;color:var(--t2);cursor:pointer;font-family:inherit}
.hbtn:active{opacity:.7}

/* MAIN */
.main{max-width:860px;margin:0 auto;padding:16px 12px 80px}
.mnav{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:16px}
.ytag{font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--acc);
  background:rgba(59,130,246,.1);border-radius:6px;padding:3px 8px;margin-right:2px}
.mbtn{height:36px;min-width:36px;padding:0 8px;border-radius:8px;
  font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;
  border:1px solid var(--b1);background:var(--s1);color:var(--t2)}
.mbtn.on{background:linear-gradient(135deg,var(--acc),var(--acc2));border-color:transparent;
  color:#fff;font-weight:700}
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
@media(min-width:580px){.cards{grid-template-columns:repeat(4,1fr)}}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px 15px}
.card.ca{background:linear-gradient(135deg,rgba(59,130,246,.1),rgba(99,102,241,.07));border-color:rgba(59,130,246,.22)}
.card.cg{background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.18)}
.card.cr{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.18)}
.clbl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.cval{font-size:18px;font-weight:700;color:#fff;font-family:'Geist Mono',monospace}
.csub{font-size:10px;color:var(--t3);margin-top:3px;line-height:1.4}
.ptrack{height:4px;background:rgba(255,255,255,.07);border-radius:99px;margin-top:10px;overflow:hidden}
.pfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .5s}
.pfill.warn{background:linear-gradient(90deg,var(--org),var(--red))}
.notif{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.18);border-radius:12px;
  padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.ntxt{font-size:12px;color:#bfdbfe;flex:1;line-height:1.5}
.nact{display:flex;gap:5px;flex-shrink:0}
.sec{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px;margin-bottom:10px}
.shead{display:flex;align-items:center;margin-bottom:11px}
.stitle{font-size:13px;font-weight:700;color:var(--t1);display:flex;align-items:center;gap:7px}
.scnt{background:rgba(59,130,246,.14);color:var(--acc);border-radius:99px;padding:2px 9px;font-size:11px;font-weight:700;font-family:'Geist Mono',monospace}
.frow{display:flex;flex-wrap:wrap;gap:6px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:100px}
.fg.w{flex:2}
.flbl{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t3)}
.fi{padding:10px 12px;border-radius:9px;background:var(--s2);border:1px solid var(--b1);
  color:var(--t1);font-family:inherit;font-size:14px;outline:none;
  transition:border .15s;width:100%;-webkit-appearance:none;min-height:44px}
.fi:focus{border-color:var(--acc)}
.fi::placeholder{color:var(--t4)}
.addbtn{padding:10px 16px;border-radius:9px;min-height:44px;
  background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;
  color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
  white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:5px}
.addbtn:active{opacity:.8}
.addbtn:disabled{opacity:.4;cursor:not-allowed}
.rlist{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.ritem{display:flex;align-items:center;gap:8px;padding:10px 12px;
  background:var(--s2);border:1px solid var(--b1);border-radius:9px}
.rdate{font-size:11px;font-weight:600;color:var(--t2);min-width:80px;font-family:'Geist Mono',monospace}
.rinfo{flex:1;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.rmemo,.ratt{font-size:11px;color:var(--t3)}
.ramt{font-size:12px;font-weight:700;color:var(--t1);font-family:'Geist Mono',monospace;min-width:72px;text-align:right}
.ract{display:flex;gap:5px;align-items:center}
.empty{text-align:center;padding:20px;font-size:12px;color:var(--t3)}
.tag{border-radius:4px;padding:2px 7px;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.ty{background:rgba(234,179,8,.13);color:var(--yel)}
.td{background:rgba(249,115,22,.13);color:var(--org)}
.te{background:rgba(239,68,68,.13);color:var(--red)}
.tp{background:rgba(59,130,246,.13);color:var(--acc)}
.tpnd{background:rgba(100,116,139,.13);color:#94a3b8}
.tok{background:rgba(34,197,94,.13);color:var(--grn)}
.tno{background:rgba(239,68,68,.13);color:var(--red)}
.bsm{padding:6px 11px;border-radius:7px;font-size:11px;font-weight:500;cursor:pointer;border:none;font-family:inherit;min-height:32px}
.bdel{background:rgba(239,68,68,.1);color:var(--red)}
.bdel:active{background:rgba(239,68,68,.25)}
.bok{background:rgba(34,197,94,.1);color:var(--grn)}
.bok:active{background:rgba(34,197,94,.25)}
.bno{background:rgba(239,68,68,.1);color:var(--red)}
.bno:active{background:rgba(239,68,68,.25)}
.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;
  border-radius:50%;animation:sp .6s linear infinite;display:inline-block;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.spin.b{border-top-color:var(--acc)}
.loading{display:flex;align-items:center;justify-content:center;gap:9px;padding:28px;color:var(--t3);font-size:13px}
.syncbar{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--t3);padding:4px 0 12px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--grn);box-shadow:0 0 6px var(--grn);flex-shrink:0;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hidden{display:none!important}

/* Install banner */
.ib{position:fixed;bottom:max(16px,env(safe-area-inset-bottom,16px));left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,#1e2130,#252940);border:1px solid rgba(59,130,246,.3);
  border-radius:16px;padding:14px 18px;display:flex;align-items:center;gap:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:100;max-width:340px;width:calc(100% - 32px)}
.ib-icon{font-size:26px;flex-shrink:0}
.ib-text{flex:1}
.ib-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:2px}
.ib-sub{font-size:11px;color:var(--t2)}
.ib-btns{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.ib-ok{padding:7px 14px;border-radius:8px;background:linear-gradient(135deg,var(--acc),var(--acc2));
  border:none;color:#fff;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer}
.ib-no{padding:5px 14px;border-radius:8px;background:none;border:1px solid var(--b2);
  color:var(--t3);font-family:inherit;font-size:11px;cursor:pointer}
</style>
</head>
<body>

<!-- AUTH SCREENS -->
<div id="screen-pw" class="aw hidden">
  <div class="ac">
    <div class="ae">🍱</div>
    <div class="at">식대 계산기</div>
    <div class="as">팀 비밀번호를 입력하세요</div>
    <div class="al">비밀번호</div>
    <input id="pw-input" class="ai" type="password" placeholder="비밀번호 입력" autocomplete="off"/>
    <div id="pw-err" class="aerr"></div>
    <button id="pw-btn" class="ab">입장하기 →</button>
  </div>
</div>

<div id="screen-name" class="aw hidden">
  <div class="ac">
    <div class="ae">👤</div>
    <div class="at">사용자 선택</div>
    <div class="as">이름을 입력하거나 목록에서 선택하세요</div>
    <div class="al">이름</div>
    <div class="aiwrap">
      <input id="name-input" class="ai" type="text" placeholder="예: 김철수" autocomplete="off"/>
      <div id="name-ac" class="aac hidden"></div>
    </div>
    <div id="name-err" class="aerr"></div>
    <button id="name-btn" class="ab">시작하기 →</button>
    <button id="name-back" class="abk">← 비밀번호로 돌아가기</button>
  </div>
</div>

<!-- MAIN -->
<div id="screen-main" class="hidden">
  <div class="hdr">
    <div class="hl"><span style="font-size:18px">🍱</span><span class="htitle">식대 계산기</span></div>
    <div class="hr">
      <span id="main-user" class="upill"></span>
      <button id="logout-btn" class="hbtn">사용자 변경</button>
    </div>
  </div>
  <div class="main">
    <div id="month-nav" class="mnav"></div>
    <div id="sync-bar" class="syncbar hidden"><div class="sdot"></div><div class="spin b"></div>노션에 저장 중...</div>
    <div id="invites-area"></div>
    <div class="cards">
      <div class="card ca"><div class="clbl">이번달 식대 총액</div><div id="c-total" class="cval">-</div><div id="c-total-sub" class="csub"></div></div>
      <div class="card"><div class="clbl">평일 근무일</div><div id="c-days" class="cval">-</div><div id="c-days-sub" class="csub"></div></div>
      <div id="c-remain-card" class="card cg"><div class="clbl">잔여 금액</div><div id="c-remain" class="cval">-</div><div id="c-remain-sub" class="csub"></div></div>
      <div class="card"><div class="clbl">사용률</div><div id="c-rate" class="cval">0%</div><div class="ptrack"><div id="c-rate-bar" class="pfill" style="width:0%"></div></div></div>
    </div>
    <div id="loading-bar" class="loading hidden"><div class="spin b"></div>노션에서 데이터 불러오는 중...</div>

    <!-- 연차 -->
    <div class="sec">
      <div class="shead"><div class="stitle">🌴 연차 <span id="ann-cnt" class="scnt">0일</span></div></div>
      <div class="frow">
        <div class="fg"><div class="flbl">날짜</div><input id="ann-date" class="fi" type="date" min="2025-01-01" max="2026-12-31"/></div>
        <button id="ann-add" class="addbtn">+ 추가</button>
      </div>
      <div id="ann-list" class="rlist"></div>
    </div>

    <!-- 회식 -->
    <div class="sec">
      <div class="shead"><div class="stitle">🍻 회식 <span id="din-cnt" class="scnt">0회</span></div></div>
      <div class="frow">
        <div class="fg"><div class="flbl">날짜</div><input id="din-date" class="fi" type="date"/></div>
        <div class="fg w"><div class="flbl">참석자 (쉼표 구분, 선택)</div><input id="din-att" class="fi" type="text" placeholder="예: 이영희, 박민준"/></div>
        <button id="din-add" class="addbtn">+ 추가</button>
      </div>
      <div id="din-list" class="rlist"></div>
    </div>

    <!-- 접대 -->
    <div class="sec">
      <div class="shead"><div class="stitle">🤝 접대 <span id="ent-cnt" class="scnt">0회</span></div></div>
      <div class="frow">
        <div class="fg"><div class="flbl">날짜</div><input id="ent-date" class="fi" type="date"/></div>
        <div class="fg w"><div class="flbl">참석자 (쉼표 구분, 선택)</div><input id="ent-att" class="fi" type="text" placeholder="예: 거래처 김대리"/></div>
        <button id="ent-add" class="addbtn">+ 추가</button>
      </div>
      <div id="ent-list" class="rlist"></div>
    </div>

    <!-- 결제 -->
    <div class="sec">
      <div class="shead"><div class="stitle">💳 결제 내역 <span id="pay-cnt" class="scnt">0원</span></div></div>
      <div class="frow">
        <div class="fg"><div class="flbl">날짜</div><input id="pay-date" class="fi" type="date"/></div>
        <div class="fg"><div class="flbl">금액 (원)</div><input id="pay-amt" class="fi" type="number" placeholder="예: 35000" step="100"/></div>
        <div class="fg w"><div class="flbl">메모 (선택)</div><input id="pay-memo" class="fi" type="text" placeholder="식당명 등"/></div>
        <button id="pay-add" class="addbtn">+ 추가</button>
      </div>
      <div id="pay-list" class="rlist"></div>
    </div>
  </div>
</div>

<!-- Install Banner -->
<div id="ib" class="ib hidden">
  <div class="ib-icon">🍱</div>
  <div class="ib-text"><div class="ib-title">홈 화면에 추가하기</div><div class="ib-sub">앱처럼 빠르게 실행할 수 있어요</div></div>
  <div class="ib-btns"><button id="ib-ok" class="ib-ok">설치</button><button id="ib-no" class="ib-no">나중에</button></div>
</div>

<script>
const NOTION_TOKEN = "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";
const TEAM_PW      = "kdkk";
const USERS_DB     = "edd1fe309fe24ee3a78995b884059fa8";
const RECORDS_DB   = "45939beb3e88416b84bbbf4af5f4e593";
const MEAL_PRICE   = 11000;

// ── 공휴일 API (공공데이터포털 한국천문연구원 특일정보) ─────────────────────────────
const HOLIDAY_API_KEY = "e01ce2b73040aa7ddb9bf365886b0a77d85dec427dcc5b9d8a5b5b05fb1e919b";
const holidayCache = {}; // { "2025-3": Set([...]) }

async function fetchHolidays(year, month) {
  const key = `${year}-${month}`;
  if (holidayCache[key] !== undefined) return holidayCache[key];
  holidayCache[key] = new Set(); // 빈 세트로 먼저 설정 (중복 호출 방지)
  try {
    const url = `https://apis.data.go.kr/B090041/openapi/service/SpcdeInfoService/getRestDeInfo?solYear=${year}&solMonth=${String(month).padStart(2,"0")}&ServiceKey=${HOLIDAY_API_KEY}&_type=json&numOfRows=20`;
    const proxied = `https://corsproxy.io/?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxied);
    const data = await res.json();
    const items = data?.response?.body?.items?.item;
    if (items) {
      const list = Array.isArray(items) ? items : [items];
      list.forEach(item => {
        if (item.isHoliday === "Y") {
          const d = String(item.locdate);
          const s = `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`;
          holidayCache[key].add(s);
        }
      });
    }
  } catch(e) { console.error("공휴일 API 오류:", e); }
  return holidayCache[key];
}

function isWeekend(s) {
  const w = new Date(s + "T00:00:00").getDay();
  return w === 0 || w === 6;
}

async function workdays(y, m) {
  const holidays = await fetchHolidays(y, m);
  const r = [], d = new Date(y, m-1, 1);
  while (d.getMonth() === m-1) {
    const s = `${y}-${String(m).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    if (!isWeekend(s) && !holidays.has(s)) r.push(s);
    d.setDate(d.getDate()+1);
  }
  return r;
}

async function nReq(method,path,body){
  const url=`https://api.notion.com/v1${path}`;
  // corsproxy.io 사용 (allorigins 대체)
  const proxied=`https://corsproxy.io/?url=${encodeURIComponent(url)}`;
  const res=await fetch(proxied,{method,headers:{"Content-Type":"application/json","Notion-Version":"2022-06-28","Authorization":`Bearer ${NOTION_TOKEN}`},...(body?{body:JSON.stringify(body)}:{})});
  const txt=await res.text();if(!res.ok)throw new Error(`HTTP ${res.status}: ${txt}`);return JSON.parse(txt);
}
const nQ=(db,f)=>nReq("POST",`/databases/${db}/query`,f?{filter:f}:{}).then(r=>r.results||[]);
const nC=(db,p)=>nReq("POST","/pages",{parent:{database_id:db},properties:p});
const nU=(id,p)=>nReq("PATCH",`/pages/${id}`,{properties:p});
const nD=(id)=>nReq("PATCH",`/pages/${id}`,{archived:true});
const pT=v=>({title:[{text:{content:String(v||"")}}]});
const pR=v=>({rich_text:[{text:{content:String(v||"")}}]});
const pDt=v=>({date:{start:v,end:null}});
const pN=v=>({number:Number(v)||0});
const pS=v=>({select:{name:v}});
function parse(pg){const p=pg.properties||{};const gt=k=>p[k]?.rich_text?.[0]?.plain_text||p[k]?.title?.[0]?.plain_text||"";return{id:pg.id,사용자:gt("사용자"),년월:gt("년월"),유형:p["유형"]?.select?.name||"",날짜:p["날짜"]?.date?.start||"",참석자:gt("참석자"),금액:p["금액"]?.number||0,상태:p["상태"]?.select?.name||"",등록자:gt("등록자"),메모:gt("메모")};}

// ── State ──────────────────────────────────────────────────────────────────────
let username="", knownUsers=[], records=[], selYear=new Date().getFullYear(), selMonth=new Date().getMonth()+1;

// ── Show/Hide screens ──────────────────────────────────────────────────────────
function showScreen(id){
  ["screen-pw","screen-name","screen-main"].forEach(s=>document.getElementById(s).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

// ── Notion ─────────────────────────────────────────────────────────────────────
async function loadRecords(){
  const ym=`${selYear}-${String(selMonth).padStart(2,"0")}`;
  document.getElementById("loading-bar").classList.remove("hidden");
  try{
    // 공휴일 API + 노션 데이터 동시 로드
    const[a,b,_]=await Promise.all([
      nQ(RECORDS_DB,{and:[{property:"사용자",rich_text:{equals:username}},{property:"년월",rich_text:{equals:ym}}]}),
      nQ(RECORDS_DB,{and:[{property:"참석자",rich_text:{contains:username}},{property:"상태",select:{equals:"대기"}}]}),
      fetchHolidays(selYear, selMonth), // 공휴일 미리 캐시
    ]);
    const seen=new Set();
    records=[...a,...b].filter(p=>{if(seen.has(p.id))return false;seen.add(p.id);return true;}).map(parse);
  }catch(e){console.error(e);}
  document.getElementById("loading-bar").classList.add("hidden");
  await updateUI();
}

function setSyncing(v){document.getElementById("sync-bar").classList.toggle("hidden",!v);}

// ── UI update (no DOM recreation for inputs!) ─────────────────────────────────
async function updateUI(){
  const ym=`${selYear}-${String(selMonth).padStart(2,"0")}`;
  const wd=await workdays(selYear,selMonth);
  const my=records.filter(r=>r.사용자===username&&r.년월===ym);
  const pend=records.filter(r=>r.상태==="대기"&&r.참석자?.includes(username)&&r.등록자!==username);

  const annRecs=my.filter(r=>r.유형==="연차");
  const dinRecs=my.filter(r=>r.유형==="회식");
  const entRecs=my.filter(r=>r.유형==="접대");
  const payRecs=my.filter(r=>r.유형==="결제");

  const annCnt=annRecs.length;
  const dinCnt=dinRecs.filter(r=>r.상태==="확인").length;
  const entCnt=entRecs.filter(r=>r.상태==="확인").length;
  const payTot=payRecs.reduce((s,r)=>s+(r.금액||0),0);
  const eff=Math.max(0,wd.length-annCnt-dinCnt-entCnt);
  const tot=eff*MEAL_PRICE, rem=tot-payTot, rate=tot>0?Math.round((payTot/tot)*100):0;

  document.getElementById("main-user").textContent="👤 "+username;
  document.getElementById("c-total").textContent=tot.toLocaleString()+"원";
  document.getElementById("c-total-sub").textContent=`유효근무일 ${eff}일 × ${MEAL_PRICE.toLocaleString()}원`;
  document.getElementById("c-days").textContent=wd.length+"일";
  document.getElementById("c-days-sub").textContent=`연차 -${annCnt} · 회식 -${dinCnt} · 접대 -${entCnt}`;
  document.getElementById("c-remain").textContent=rem.toLocaleString()+"원";
  document.getElementById("c-remain").style.color=rem>=0?"var(--grn)":"var(--red)";
  document.getElementById("c-remain-card").className="card "+(rem>=0?"cg":"cr");
  document.getElementById("c-remain-sub").textContent="결제 "+payTot.toLocaleString()+"원";
  document.getElementById("c-rate").textContent=rate+"%";
  const bar=document.getElementById("c-rate-bar");
  bar.style.width=Math.min(100,rate)+"%";
  bar.className="pfill"+(rate>90?" warn":"");

  document.getElementById("ann-cnt").textContent=annCnt+"일";
  document.getElementById("din-cnt").textContent=dinCnt+"회";
  document.getElementById("ent-cnt").textContent=entCnt+"회";
  document.getElementById("pay-cnt").textContent=payTot.toLocaleString()+"원";

  // Month nav - 현재월 기준 앞뒤 2달
  const nav=document.getElementById("month-nav");
  nav.innerHTML="";
  const now=new Date();
  const months=[];
  for(let i=-2;i<=2;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    months.push({y:d.getFullYear(),m:d.getMonth()+1});
  }
  let lastY=null;
  months.forEach(({y,m})=>{
    if(y!==lastY){
      const tag=document.createElement("span");tag.className="ytag";tag.textContent=y;nav.appendChild(tag);
      lastY=y;
    }
    const btn=document.createElement("button");
    btn.className="mbtn"+(selYear===y&&selMonth===m?" on":"");
    btn.textContent=m+"월";
    btn.onclick=()=>{selYear=y;selMonth=m;records=[];updateUI();loadRecords();};
    nav.appendChild(btn);
  });


  // Invites
  const ia=document.getElementById("invites-area");ia.innerHTML="";
  pend.forEach(inv=>{
    const d=document.createElement("div");d.className="notif";
    d.innerHTML=`<div class="ntxt">📨 <strong>${inv.등록자}</strong>님이 <strong>${inv.유형}</strong> 초대 · ${inv.날짜}</div>`;
    const acts=document.createElement("div");acts.className="nact";
    const ok=document.createElement("button");ok.className="bsm bok";ok.textContent="✓ 확인";ok.onclick=()=>doInvite(inv,true);
    const no=document.createElement("button");no.className="bsm bno";no.textContent="✕ 거절";no.onclick=()=>doInvite(inv,false);
    acts.appendChild(ok);acts.appendChild(no);d.appendChild(acts);ia.appendChild(d);
  });

  // Record lists
  renderList("ann-list", annRecs, r=>{
    const tag=`<span class="tag ty">연차</span>`;
    return `<div class="rdate">${r.날짜}</div><div class="rinfo">${tag}</div>`;
  });
  renderList("din-list", dinRecs, r=>{
    const stCls=r.상태==="확인"?"tok":r.상태==="거절"?"tno":"tpnd";
    return `<div class="rdate">${r.날짜}</div><div class="rinfo"><span class="tag td">회식</span>${r.참석자?`<span class="ratt">👥 ${r.참석자}</span>`:""}</div><div class="ract"><span class="tag ${stCls}">${r.상태||"확인"}</span></div>`;
  });
  renderList("ent-list", entRecs, r=>{
    const stCls=r.상태==="확인"?"tok":r.상태==="거절"?"tno":"tpnd";
    return `<div class="rdate">${r.날짜}</div><div class="rinfo"><span class="tag te">접대</span>${r.참석자?`<span class="ratt">👥 ${r.참석자}</span>`:""}</div><div class="ract"><span class="tag ${stCls}">${r.상태||"확인"}</span></div>`;
  });
  renderList("pay-list", payRecs, r=>{
    return `<div class="rdate">${r.날짜}</div><div class="rinfo"><span class="tag tp">결제</span>${r.메모?`<span class="rmemo">${r.메모}</span>`:""}</div><div class="ramt">${(r.금액||0).toLocaleString()}원</div>`;
  });
}

function renderList(id, recs, rowHtml){
  const el=document.getElementById(id);el.innerHTML="";
  if(!recs.length){el.innerHTML=`<div class="empty">등록된 항목이 없습니다</div>`;return;}
  recs.forEach(r=>{
    const row=document.createElement("div");row.className="ritem";
    row.innerHTML=rowHtml(r);
    const del=document.createElement("button");del.className="bsm bdel";del.textContent="삭제";
    del.onclick=()=>doDelete(r.id);
    const ract=row.querySelector(".ract")||row;
    ract.appendChild(del);
    el.appendChild(row);
  });
}

// ── Actions ────────────────────────────────────────────────────────────────────
async function doAdd(type){
  const lbl={annual:"연차",dinner:"회식",entertain:"접대",payment:"결제"}[type];
  const ym=`${selYear}-${String(selMonth).padStart(2,"0")}`;
  let date="",att="",amt=0,memo="";

  if(type==="annual")        {date=document.getElementById("ann-date").value;}
  else if(type==="dinner")   {date=document.getElementById("din-date").value;att=document.getElementById("din-att").value.trim();}
  else if(type==="entertain"){date=document.getElementById("ent-date").value;att=document.getElementById("ent-att").value.trim();}
  else{date=document.getElementById("pay-date").value;amt=parseFloat(document.getElementById("pay-amt").value)||0;memo=document.getElementById("pay-memo").value;}

  if(!date)return;
  const btn=document.getElementById(type==="annual"?"ann-add":type==="dinner"?"din-add":type==="entertain"?"ent-add":"pay-add");
  btn.disabled=true;btn.innerHTML='<div class="spin"></div>';
  setSyncing(true);
  try{
    // 참석자 목록 파싱
    const attList = att ? att.split(",").map(s=>s.trim()).filter(Boolean) : [];
    // 전체 참석자 (등록자 포함)
    const allAtt = attList.length ? [username,...attList].join(", ") : "";

    // 1. 등록자 본인 레코드 (확인 상태)
    const myProps={
      "제목":pT(`${username}_${date}_${lbl}`),"사용자":pR(username),
      "년월":pR(ym),"유형":pS(lbl),"날짜":pDt(date),
      "참석자":pR(allAtt),"금액":pN(amt),"상태":pS("확인"),
      "등록자":pR(username),"메모":pR(memo),
    };
    const myPg=await nC(RECORDS_DB,myProps);
    records.push(parse(myPg));

    // 2. 참석자 각각 별도 레코드 (대기 상태) - 회식/접대만
    if((type==="dinner"||type==="entertain") && attList.length>0){
      for(const person of attList){
        const attProps={
          "제목":pT(`${person}_${date}_${lbl}`),"사용자":pR(person),
          "년월":pR(ym),"유형":pS(lbl),"날짜":pDt(date),
          "참석자":pR(allAtt),"금액":pN(0),"상태":pS("대기"),
          "등록자":pR(username),"메모":pR(memo),
        };
        const attPg=await nC(RECORDS_DB,attProps);
        records.push(parse(attPg));
      }
    }

    if(type==="annual")document.getElementById("ann-date").value="";
    if(type==="dinner"){document.getElementById("din-date").value="";document.getElementById("din-att").value="";}
    if(type==="entertain"){document.getElementById("ent-date").value="";document.getElementById("ent-att").value="";}
    if(type==="payment"){document.getElementById("pay-date").value="";document.getElementById("pay-amt").value="";document.getElementById("pay-memo").value="";}
    await updateUI();
  }catch(e){console.error(e);alert("저장 실패: "+e.message);}
  setSyncing(false);
  btn.disabled=false;btn.textContent="+ 추가";
}

async function doDelete(id){
  records=records.filter(r=>r.id!==id);updateUI();
  setSyncing(true);try{await nD(id);}catch(e){}setSyncing(false);
}

async function doInvite(rec,accept){
  const ns=accept?"확인":"거절";
  records=records.map(r=>r.id===rec.id?{...r,상태:ns}:r);updateUI();
  setSyncing(true);try{await nU(rec.id,{"상태":pS(ns)});}catch(e){}setSyncing(false);
}

// ── Auth ───────────────────────────────────────────────────────────────────────
function initPwScreen(){
  showScreen("screen-pw");
  const inp=document.getElementById("pw-input");
  const err=document.getElementById("pw-err");
  const btn=document.getElementById("pw-btn");
  inp.value="";err.textContent="";
  inp.focus();

  async function submit(){
    if(inp.value!==TEAM_PW){err.textContent="비밀번호가 올바르지 않습니다.";return;}
    btn.disabled=true;btn.innerHTML='<div class="spin" style="margin:0 auto"></div>';
    try{const pgs=await nQ(USERS_DB,undefined);knownUsers=pgs.map(p=>p.properties["이름"]?.title?.[0]?.plain_text||"").filter(Boolean);}catch(e){}
    btn.disabled=false;btn.textContent="입장하기 →";
    initNameScreen();
  }
  btn.onclick=submit;
  inp.onkeydown=e=>{if(e.key==="Enter")submit();};
}

function initNameScreen(){
  showScreen("screen-name");
  const inp=document.getElementById("name-input");
  const ac=document.getElementById("name-ac");
  const err=document.getElementById("name-err");
  const btn=document.getElementById("name-btn");
  const back=document.getElementById("name-back");
  inp.value="";err.textContent="";ac.classList.add("hidden");
  inp.focus();

  inp.oninput=()=>{
    const v=inp.value;
    const matches=v?knownUsers.filter(u=>u.includes(v)&&u!==v):knownUsers;
    if(matches.length){
      ac.innerHTML="";
      matches.slice(0,6).forEach(u=>{
        const item=document.createElement("div");item.className="aaci";item.textContent="👤 "+u;
        item.onmousedown=()=>{inp.value=u;ac.classList.add("hidden");};
        ac.appendChild(item);
      });
      ac.classList.remove("hidden");
    }else{ac.classList.add("hidden");}
  };
  inp.onblur=()=>setTimeout(()=>ac.classList.add("hidden"),200);
  inp.onfocus=()=>inp.oninput();

  async function submit(){
    if(!inp.value.trim()){err.textContent="이름을 입력해주세요.";return;}
    btn.disabled=true;btn.innerHTML='<div class="spin" style="margin:0 auto"></div>';
    try{const ex=await nQ(USERS_DB,{property:"이름",title:{equals:inp.value.trim()}});if(!ex.length)await nC(USERS_DB,{"이름":pT(inp.value.trim())});}catch(e){}
    username=inp.value.trim();
    localStorage.setItem("ml_usr",username);
    btn.disabled=false;btn.textContent="시작하기 →";
    initMainScreen();
  }
  btn.onclick=submit;
  inp.onkeydown=e=>{if(e.key==="Enter")submit();};
  back.onclick=initPwScreen;
}

function initMainScreen(){
  showScreen("screen-main");
  document.getElementById("logout-btn").onclick=()=>{
    localStorage.removeItem("ml_usr");username="";records=[];initPwScreen();
  };
  document.getElementById("ann-add").onclick=()=>doAdd("annual");
  document.getElementById("din-add").onclick=()=>doAdd("dinner");
  document.getElementById("ent-add").onclick=()=>doAdd("entertain");
  document.getElementById("pay-add").onclick=()=>doAdd("payment");
  updateUI();
  loadRecords();
}

// ── PWA Install ────────────────────────────────────────────────────────────────
let dp=null;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();dp=e;
  if(!localStorage.getItem("pwa_no"))document.getElementById("ib").classList.remove("hidden");
});
document.getElementById("ib-ok").onclick=async()=>{document.getElementById("ib").classList.add("hidden");if(dp){dp.prompt();dp=null;}};
document.getElementById("ib-no").onclick=()=>{document.getElementById("ib").classList.add("hidden");localStorage.setItem("pwa_no","1");};

// ── Init ───────────────────────────────────────────────────────────────────────
const savedUser=localStorage.getItem("ml_usr");
if(savedUser){username=savedUser;initMainScreen();}
else initPwScreen();

if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
